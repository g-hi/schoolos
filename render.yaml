databases:
  - name: schoolos-db
    plan: free
    databaseName: schoolos
    user: schoolos_user
    ipAllowList: []

services:
  - type: web
    name: schoolos-gateway
    runtime: docker
    repo: https://github.com/g-hi/schoolos
    branch: master
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: schoolos-db
          property: connectionString
      - key: REDIS_URL
        value: ""
      - key: APP_ENV
        value: production
      - key: GROQ_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
